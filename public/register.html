<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Mise</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <div class="brand">
      <div class="brand-mark">Mise<span>·</span>en<span>·</span>place</div>
      <div class="brand-tag">Recipe Finder</div>
    </div>

    <h1>Create account</h1>
    <p class="auth-subtitle">Snap your fridge. Find what you can cook.</p>

    <div id="alert" class="alert"></div>

    <form id="authForm" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required minlength="3" />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required minlength="6" />
      </div>

      <button type="submit" id="submitBtn" class="btn btn-primary">Create account</button>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </main>

  <script>window.PAGE_MODE = 'register';</script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
